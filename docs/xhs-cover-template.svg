        <rect x="36" y="68" width="24" height="18" rx="3" fill="#f8e987"/>
        <rect x="66" y="68" width="24" height="18" rx="3" fill="#d6f0df"/>
        <rect x="96" y="68" width="24" height="18" rx="3" fill="#efd8f7"/>
