      <rect x="213" y="3" width="84" height="84" rx="7" fill="#ff9c2e"/>
      <path d="M248 29c20 1 27 12 24 31-19 3-30-5-33-23-1-5 3-8 9-8Z" fill="#d9ff2e"/>
      <rect x="315" width="90" height="90" rx="9" fill="#f5f9ff" stroke="#ece8e2"/>
      <rect x="318" y="3" width="84" height="84" rx="7" fill="#eef6ff"/>
      <rect x="420" width="90" height="90" rx="9" fill="#2f2a27" stroke="#ece8e2"/>
      <rect x="423" y="3" width="84" height="84" rx="7" fill="#2c2927"/>
      <rect x="525" width="90" height="90" rx="9" fill="#f5f6ff" stroke="#ece8e2"/>
      <rect x="528" y="3" width="84" height="84" rx="7" fill="#f5f6ff"/>

      <rect y="105" width="90" height="90" rx="9" fill="#f4f8ff" stroke="#ece8e2"/>
      <rect x="105" y="105" width="90" height="90" rx="9" fill="#fff" stroke="#ece8e2"/>
      <rect x="210" y="105" width="90" height="90" rx="9" fill="#f5fff5" stroke="#ece8e2"/>
      <rect x="315" y="105" width="90" height="90" rx="9" fill="#e9edf2" stroke="#ece8e2"/>
      <rect x="420" y="105" width="90" height="90" rx="9" fill="#f7f2ff" stroke="#ece8e2"/>
      <rect x="525" y="105" width="90" height="90" rx="9" fill="#fff6e9" stroke="#ece8e2"/>
