<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f4f5f6"/>
    </linearGradient>
    <linearGradient id="buttonRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef1f2d"/>
      <stop offset="1" stop-color="#e0222c"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1b1b1b" flood-opacity=".14"/>
    </filter>
    <filter id="cardShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#1b1b1b" flood-opacity=".10"/>
    </filter>
    <filter id="titleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="2.5" flood-color="#000000" flood-opacity=".18"/>
    </filter>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .title-red { fill: #df2d34; font-weight: 900; font-size: 86px; letter-spacing: 2px; }
      .title-black { fill: #202124; font-weight: 900; font-size: 82px; letter-spacing: 1px; }
      .subtitle { fill: #666a70; font-weight: 500; font-size: 34px; }
      .ui-title { fill: #111; font-weight: 800; font-size: 30px; }
      .ui-text { fill: #4f565e; font-size: 20px; }
      .ui-label { fill: #3a3f45; font-size: 21px; font-weight: 500; }
      .small { fill: #5e6570; font-size: 16px; }
      .chip-text { fill: #2a2d31; font-size: 28px; font-weight: 500; }
    </style>
  </defs>

  <rect width="1080" height="1440" fill="url(#bg)"/>

  <!-- Background shapes -->
  <circle cx="1030" cy="-90" r="310" fill="#edf0f3" opacity=".62"/>
  <circle cx="-120" cy="1220" r="260" fill="#ffffff" opacity=".85"/>
  <circle cx="-118" cy="1220" r="208" fill="none" stroke="#ffffff" stroke-width="3" opacity=".8"/>

  <!-- Dotted decoration -->
  <g opacity=".65" fill="#d9dde2">
    <circle cx="36" cy="36" r="2.6"/><circle cx="54" cy="36" r="2.6"/><circle cx="72" cy="36" r="2.6"/><circle cx="90" cy="36" r="2.6"/><circle cx="108" cy="36" r="2.6"/><circle cx="126" cy="36" r="2.6"/><circle cx="144" cy="36" r="2.6"/><circle cx="162" cy="36" r="2.6"/>
    <circle cx="36" cy="54" r="2.6"/><circle cx="54" cy="54" r="2.6"/><circle cx="72" cy="54" r="2.6"/><circle cx="90" cy="54" r="2.6"/><circle cx="108" cy="54" r="2.6"/><circle cx="126" cy="54" r="2.6"/><circle cx="144" cy="54" r="2.6"/><circle cx="162" cy="54" r="2.6"/>
    <circle cx="36" cy="72" r="2.6"/><circle cx="54" cy="72" r="2.6"/><circle cx="72" cy="72" r="2.6"/><circle cx="90" cy="72" r="2.6"/><circle cx="108" cy="72" r="2.6"/><circle cx="126" cy="72" r="2.6"/><circle cx="144" cy="72" r="2.6"/><circle cx="162" cy="72" r="2.6"/>
    <circle cx="36" cy="90" r="2.6"/><circle cx="54" cy="90" r="2.6"/><circle cx="72" cy="90" r="2.6"/><circle cx="90" cy="90" r="2.6"/><circle cx="108" cy="90" r="2.6"/><circle cx="126" cy="90" r="2.6"/><circle cx="144" cy="90" r="2.6"/><circle cx="162" cy="90" r="2.6"/>
  </g>

