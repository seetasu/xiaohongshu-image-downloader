    <rect x="568" y="158" width="84" height="42" rx="10" fill="#fff" stroke="#ddd8d0"/>
    <text class="font" x="591" y="185" font-size="18" font-weight="600" fill="#4b4b4b">更改</text>

    <text class="font ui-label" x="40" y="244">存储为</text>
